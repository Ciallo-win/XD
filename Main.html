        * {

        body {

            background: linear-gradient(135deg, #ffe6f0 0%, #ffb3d9 100%);

            font-family: 'Ubuntu', 'Pacifico', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 移动端背景 - 通过media查询设置API背景 */
        @media (max-width: 768px) {
            body {

            }
        }

        /* 极淡遮罩，让背景更柔和 */

            content: '';

            top: 0;
            left: 0;

            z-index: -1;

        /* 主容器 - 优雅居中 */
        .Ciallo-main {
            display: flex;

            align-items: center;
            justify-content: center;

            padding: 20px;

            margin: 0 auto;

        /* ===== 主角：Ciallo大标题区域（最突出，最强毛玻璃） ===== */

            width: 100%;

            backdrop-filter: blur(30px) saturate(200%);

            text-align: center;

            100% { transform: translateY(0px); }
        }

        .hero-title {
            font-size: 48px;
            color: #ff4d94;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px white, 0 0 30px rgba(255, 126, 185, 0.3);

            font-weight: 800;
            letter-spacing: 2px;
        }

        .gradientText {
            background: linear-gradient(45deg, #ff4d94, #ff7eb9, #ffb3d9, #ff7eb9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradient 8s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero-description {

    <script>
        // 使用JavaScript确保背景图加载完成后再隐藏加载动画
        window.addEventListener('DOMContentLoaded', function() {
            // 创建图片对象预加载背景
            const bgImage = new Image();
            
            // 根据屏幕宽度选择对应的背景图
            const isMobile = window.innerWidth <= 768;
            const bgUrl = isMobile 
                ? 'http://api.escateam.icu/mm/index.php?'
                : 'http://api.escateam.icu/pc/index.php?';
            
            // 设置背景图加载完成后的回调
            bgImage.onload = function() {
                // 背景图加载完成后，设置body背景
                document.body.style.backgroundImage = `url('${bgUrl}')`;
                
                // 隐藏加载动画
                const loading = document.getElementById('Ciallo-loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                    }, 300);
                }
            };
            
            // 如果图片已经缓存，onload会立即触发
            bgImage.src = bgUrl;
            
            // 设置超时保护，防止图片加载失败导致加载动画一直显示
            setTimeout(() => {
                const loading = document.getElementById('Ciallo-loading');
                if (loading && loading.style.display !== 'none') {
                    // 即使图片加载失败，也要隐藏加载动画
                    document.body.style.backgroundImage = `url('${bgUrl}')`;
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                    }, 300);
                }
            }, 15000); // 5秒超时
        });

        // 弹窗函数
        function pop(imgSrc) {
            var tc = document.querySelector('.tc');
            var tcImg = document.querySelector('.tc-img');
            if (tc && tcImg) {
                tcImg.src = imgSrc;
                tc.style.display = 'flex';
            }
        }

        // 点击关闭弹窗
        document.querySelector('.tc')?.addEventListener('click', function(e) {
            if (e.target === this || e.target.classList.contains('tc-main')) {
                this.style.display = 'none';
            }
        });

        // 阻止B站链接的冒泡（不影响弹窗）
        document.querySelectorAll('.contact-item').forEach(item => {
            item.addEventListener('click', function(e) {
                if (this.classList.contains('bilibili')) {
                    // 正常跳转，不需要额外处理
                    return;
                }
                // QQ 阻止默认跳转，只显示弹窗
                if (this.classList.contains('qq')) {
                    e.preventDefault();
                }
            });
        });

        // 动态设置移动端背景（如果媒体查询不生效的备用方案）
        if (window.innerWidth <= 768) {
            // 确保背景图已设置（媒体查询已处理，这里是备用）
            document.body.style.backgroundImage = "url('http://api.escateam.icu/mm/index.php?')";
        }
    </script>
</body>
</html>
