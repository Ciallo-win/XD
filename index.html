    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const isMobile = window.innerWidth <= 768;
            const imageFolder = isMobile ? './static/backscreen/phone/' : './static/backscreen/pc/';
            const imageCount = 10;
            const randomNum = Math.floor(Math.random() * imageCount) + 1;
            
            // 预加载背景图片
            const bgImage = new Image();
            const bgUrl = imageFolder + randomNum + '.jpg';
            
            // 立即开始预加载图片
            bgImage.src = bgUrl;
            
            function hideLoading() {
                const loading = document.getElementById('Ciallo-loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                    }, 300);
                }
            }
            
            // 图片加载成功
            bgImage.onload = function() {
                document.body.style.backgroundImage = `url('${bgUrl}')`;
                hideLoading();
            };
            
            // JPG 加载失败，尝试 PNG
            bgImage.onerror = function() {
                const pngPath = imageFolder + randomNum + '.png';
                const pngImage = new Image();
                pngImage.src = pngPath;
                
                pngImage.onload = function() {
                    document.body.style.backgroundImage = `url('${pngPath}')`;
                    hideLoading();
                };
                
                pngImage.onerror = function() {
                    // PNG 也加载失败，使用渐变背景
                    document.body.style.background = 'linear-gradient(135deg, #ffe6f0, #ffb3d9)';
                    hideLoading();
                };
            };
            
            // 超时处理：如果 15 秒后图片还没加载完成，先隐藏加载动画
            setTimeout(() => {
                const loading = document.getElementById('Ciallo-loading');
                if (loading && loading.style.display !== 'none') {
                    // 图片还在加载中，先显示渐变背景
                    document.body.style.background = 'linear-gradient(135deg, #ffe6f0, #ffb3d9)';
                    hideLoading();
                    
                    // 图片加载完成后再设置背景
                    bgImage.onload = function() {
                        document.body.style.backgroundImage = `url('${bgUrl}')`;
                    };
                }
            }, 15000);
        });

        function pop(imgSrc) {
            var tc = document.querySelector('.tc');
            var tcImg = document.querySelector('.tc-img');
            if (tc && tcImg) {
                tcImg.src = imgSrc;
                tc.style.display = 'flex';
            }
        }

        document.querySelector('.tc')?.addEventListener('click', function(e) {
            if (e.target === this || e.target.classList.contains('tc-main')) {
                this.style.display = 'none';
            }
        });

        document.querySelectorAll('.contact-item').forEach(item => {
            item.addEventListener('click', function(e) {
                if (this.classList.contains('bilibili')) {
                    return;
                }
                if (this.classList.contains('qq')) {
                    e.preventDefault();
                }
            });
        });

        if (window.innerWidth <= 768) {
            const isMobile = true;
            const imageFolder = './static/backscreen/phone/';
            const imageCount = 10;
            const randomNum = Math.floor(Math.random() * imageCount) + 1;
            document.body.style.backgroundImage = `url('${imageFolder}${randomNum}.jpg')`;
        }
    </script>
