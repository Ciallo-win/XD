    <script>
        window.addEventListener('DOMContentLoaded', function() {
           const isMobile = window.innerWidth <= 768;
           const imageFolder = isMobile ? './static/backscreen/phone/' : './static/backscreen/pc/';
           const imageCount = 10;
           const randomNum = Math.floor(Math.random() * imageCount) + 1;

           const bgImage = new Image();
           const bgUrl = imageFolder + randomNum + '.jpg';

            bgImage.src = bgUrl;
            
            function hideLoading() {
               const loading = document.getElementById('Ciallo-loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                    }, 300);
                }
            }

            bgImage.onload = function() {
                document.body.style.backgroundImage = `url('${bgUrl}')`;
                hideLoading();
            };

            bgImage.onerror = function() {
               const pngPath = imageFolder + randomNum + '.png';
               const pngImage = new Image();
                pngImage.src = pngPath;
                
                pngImage.onload = function() {
                    document.body.style.backgroundImage = `url('${pngPath}')`;
                    hideLoading();
                };
                
                pngImage.onerror = function() {
                    document.body.style.background = 'linear-gradient(135deg, #ffe6f0, #ffb3d9)';
                    hideLoading();
                };
            };

            setTimeout(() => {
               const loading = document.getElementById('Ciallo-loading');
                if (loading && loading.style.display !== 'none') {
                    document.body.style.background = 'linear-gradient(135deg, #ffe6f0, #ffb3d9)';
                    hideLoading();

                    bgImage.onload = function() {
                        document.body.style.backgroundImage = `url('${bgUrl}')`;
                    };
                }
            }, 15000);
        });
    </script>
